<!DOCTYPE html>
<html>
<head>
<title>Announcements</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Announcements</h1>

<!-- FORM -->
<div class="bg-white p-4 rounded shadow mb-6">
<input id="title" placeholder="Title" class="w-full p-2 border mb-3 rounded">

<select id="targetEvent"
class="w-full p-2 border mb-3 rounded">
<option value="all">
All Participants
</option>
</select>

<textarea id="message" placeholder="Message" 
class="w-full p-2 border mb-3 rounded"></textarea>

<button onclick="sendAnnouncement()" 
class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
Send Announcement
</button>

<p id="msg" class="mt-2 text-green-500"></p>
</div>

<!-- LIST -->
<div id="list" class="space-y-3"></div>

<script>

  async function loadEventOptions(){

const res=
await fetch(
"http://localhost:5000/events"
);

const data=
await res.json();

const select=
document.getElementById("targetEvent");

data.forEach(e=>{

const opt=
document.createElement("option");

opt.value=e.name;
opt.textContent=e.name;

select.appendChild(opt);

});

}

loadEventOptions();

// SEND
async function sendAnnouncement() {
  const title = document.getElementById("title").value.trim();
  const message = document.getElementById("message").value.trim();

  if (!title || !message) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/announce", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
      title,
      message,
      event:
      document.getElementById(
      "targetEvent"
      ).value
      })
    });

    const data = await res.json();

    document.getElementById("msg").innerText = data.message;

    // 🔥 CLEAR INPUTS
    document.getElementById("title").value = "";
    document.getElementById("message").value = "";

    loadAnnouncements();

  } catch (err) {
    alert("Error sending announcement");
  }
}

// LOAD
async function loadAnnouncements() {
  try {
    const res = await fetch("http://localhost:5000/announcements");
    const data = await res.json();

    const div = document.getElementById("list");
    div.innerHTML = "";

    data.forEach(a => {
      const card = document.createElement("div");
      card.className = "bg-white p-4 rounded shadow";

      card.innerHTML = `
     <div class="flex justify-between items-center">
     <h2 class="font-bold">${a.title}</h2>
     <button onclick="deleteAnnouncement('${a.id}')" 
      class="text-red-500 text-sm hover:underline">
      Delete
     </button>
     </div>

  <p class="text-sm text-gray-600">${a.message}</p>

  <p class="text-xs text-gray-400">
    ${new Date(a.created_at).toLocaleString()}
  </p>
  `;

      div.appendChild(card);
    });

  } catch (err) {
    console.log(err);
  }
}

loadAnnouncements();

async function deleteAnnouncement(id) {
  if (!confirm("Are you sure you want to delete this?")) return;

  const res = await fetch(`http://localhost:5000/announcement/${id}`, {
    method: "DELETE"
  });

  const data = await res.json();
  alert(data.message);

  loadAnnouncements(); // refresh
}

</script>

</body>
</html>
