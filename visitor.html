<!DOCTYPE html>
<html>
<head>
<title>Visitor Entry</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">
<h2 class="text-lg font-bold mb-4 text-center">Visitor Entry</h2>

<input id="name" placeholder="Name" class="w-full p-2 border mb-3 rounded">
<input id="email" placeholder="Email" class="w-full p-2 border mb-3 rounded">

<button onclick="register()" class="w-full bg-blue-500 text-white p-2 rounded">
Get Entry QR
</button>

<p id="msg" class="mt-3 text-center text-green-500"></p>

</div>

<script>
async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  const res = await fetch("https://eventhive-bxaw.onrender.com/visitor-register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.message;
}
</script>

</body>
</html>
