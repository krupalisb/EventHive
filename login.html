<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">

<h2 class="text-xl mb-4 text-center font-bold">Login</h2>

<input id="username" placeholder="Username" class="w-full p-2 border mb-3">
<input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3">

<button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded">
Login
</button>

<p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>

</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://eventhive-bxaw.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("role", data.role);

    if (data.role === "admin") {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "register.html";
    }
  } else {
    document.getElementById("msg").innerText = data.message;
  }
}
</script>

</body>
</html>
