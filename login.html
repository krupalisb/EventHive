<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-black">

<!-- Background -->
<div class="absolute inset-0">
<img
src="https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1920&auto=format&fit=crop"
class="w-full h-full object-cover">
</div>

<!-- Overlay -->
<div class="absolute inset-0 bg-black/65"></div>
<div class="relative z-10 backdrop-blur-md bg-white/10 border border-white/20 p-8 rounded-2xl shadow-2xl w-80 text-white">

<h2 class="text-2xl mb-6 text-center font-bold">
Login
</h2>

<input
id="username"
placeholder="Username"
class="w-full p-3 bg-white/20 border border-white/30 rounded-xl mb-4 text-white placeholder-gray-200">

<input
id="password"
type="password"
placeholder="Password"
class="w-full p-3 bg-white/20 border border-white/30 rounded-xl mb-4 text-white placeholder-gray-200">

<button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white p-3 rounded-xl font-semibold">
Login
</button>

<p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>

</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://eventhive-bxaw.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("role", data.role);

    if (data.role === "admin") {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "register.html";
    }
  } else {
    document.getElementById("msg").innerText = data.message;
  }
}
</script>

</body>
</html>
