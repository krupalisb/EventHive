<!DOCTYPE html>
<html>
<head>
<title>Visitor Registration</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-xl font-bold mb-4 text-center">
Visitor Registration
</h2>

<form id="visitorForm">

<input
id="name"
placeholder="Visitor Name"
class="w-full p-2 border mb-3 rounded"
required>

<input
type="email"
id="email"
placeholder="Email"
class="w-full p-4 border mb-4 rounded"
required>

<button class="w-full bg-blue-500 text-white p-2 rounded">
Get QR Pass
</button>

</form>

<p id="msg" class="mt-3 text-green-500 text-center"></p>

</div>

<script>

document.getElementById(
"visitorForm"
).addEventListener(
"submit",
async function(e){

e.preventDefault();

const res=await fetch(
"https://eventhive-bxaw.onrender.com/visitor-register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:
document.getElementById("name").value,
email:
document.getElementById("email").value
})
}
);

const data=await res.json();

document.getElementById(
"msg"
).innerText=data.message;

localStorage.setItem(
"visitorEmail",
document.getElementById("email").value
);

setTimeout(()=>{
window.location.href=
"visitor-dashboard.html";
},1500);

}
);

</script>

</body>
</html>
